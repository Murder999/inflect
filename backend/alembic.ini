# Alembic configuration — Part 17
# The DATABASE_URL env var always takes priority over sqlalchemy.url below.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Fallback URL — override via DATABASE_URL environment variable
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost/inflect

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
